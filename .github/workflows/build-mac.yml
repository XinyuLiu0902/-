name: Build Mac App

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装打包工具
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller

      - name: 执行 PyInstaller 打包
        run: |
          pyinstaller --windowed \
            --onefile \
            --name "计时器" \
            --clean \
            timernew.py

      - name: 打包成 ZIP（保护应用权限）
        run: |
          cd dist
          zip -r 计时器_Mac.zip 计时器.app

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: Mac-App
          path: dist/计时器_Mac.zip
